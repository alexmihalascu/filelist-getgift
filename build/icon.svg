<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171d25"/>
      <stop offset="1" stop-color="#0e1116"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#46ddd0"/>
      <stop offset="1" stop-color="#2aa89e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.34" r="0.6">
      <stop offset="0" stop-color="#34d0c4" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#34d0c4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded dark tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#glow)"/>
  <rect x="6" y="6" width="1012" height="1012" rx="228" fill="none" stroke="#34d0c4" stroke-opacity="0.18" stroke-width="3"/>

  <!-- gift mark, centered -->
  <g transform="translate(512,540)" stroke="url(#teal)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- lid -->
    <rect x="-232" y="-150" width="464" height="104" rx="26"/>
    <!-- box body -->
    <path d="M-196 -46 L-196 196 a26 26 0 0 0 26 26 L170 222 a26 26 0 0 0 26 -26 L196 -46"/>
    <!-- vertical ribbon -->
    <line x1="0" y1="-150" x2="0" y2="222"/>
    <!-- bow loops -->
    <path d="M0 -150 C -150 -150, -190 -300, -88 -300 C -10 -300, 0 -180, 0 -150"/>
    <path d="M0 -150 C 150 -150, 190 -300, 88 -300 C 10 -300, 0 -180, 0 -150"/>
  </g>
</svg>
