name: Build installers

# Build .dmg (macOS), .exe (Windows) and .AppImage (Linux) on their native
# runners.
#   - Manual run (workflow_dispatch): installers are uploaded as Artifacts.
#   - Tag push (vX.Y.Z): installers are also attached to a public GitHub Release.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Needed so the release job can create a Release and upload assets.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build: npm run build:mac
            artifact: 'dist/*.dmg'
          - os: windows-latest
            build: npm run build:win
            artifact: 'dist/*.exe'
          - os: ubuntu-latest
            build: npm run build:linux
            artifact: 'dist/*.AppImage'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Skip the postinstall Chromium download in CI: the app fetches Chromium
      # at first run, so it is not needed inside the installer.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build installer
        run: ${{ matrix.build }}
        env:
          # Avoid code-signing prompts on macOS CI (unsigned build).
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Always available from the run page (Actions > run > Artifacts).
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

      # Only on tag pushes: attach the installer to a public GitHub Release.
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          fail_on_unmatched_files: true
          generate_release_notes: true
